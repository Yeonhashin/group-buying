name: Backend Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: group-buying-backend

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 권한 부여
        run: chmod +x ./gradlew

      - name: 테스트 실행 + 커버리지 리포트 생성
        run: ./gradlew test jacocoTestReport

      - name: 테스트 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: group-buying-backend/build/reports/tests/test

      - name: 커버리지 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: group-buying-backend/build/reports/jacoco/test/jacocoTestReport.xml

      - name: 이전 커버리지 리포트 다운로드
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: test.yml
          name: jacoco-report
          path: previous-coverage
          branch: main
          if_no_artifact_found: warn

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: anthropic 패키지 설치
        working-directory: .
        run: pip install anthropic

      - name: 커버리지 분석 (AI)
        working-directory: .
        env:
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |              
          python scripts/analyze_coverage.py \
          group-buying-backend/build/reports/jacoco/test/jacocoTestReport.xml \
          previous-coverage/jacocoTestReport.xml || true

      - name: PR에 분석 결과 코멘트 등록
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
            path: coverage_analysis.md
            header: coverage-analysis

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Node 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 백엔드 빌드
        working-directory: group-buying-backend
        run: chmod +x ./gradlew && ./gradlew build -x test

      - name: 백엔드 실행 (테스트 프로파일, 백그라운드)
        working-directory: group-buying-backend
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          nohup java -jar "$JAR_FILE" \
            --spring.profiles.active=test,e2e \
            > backend.log 2>&1 &

      - name: 백엔드 준비 대기
        run: npx wait-on http://localhost:8081/api/auth/login -t 60000 --httpMethod POST || true

      - name: 프론트엔드 의존성 설치
        working-directory: group-buying-frontend
        run: npm ci

      - name: Playwright 브라우저 설치
        working-directory: group-buying-frontend
        run: npx playwright install --with-deps chromium

      - name: 프론트엔드 빌드
        working-directory: group-buying-frontend
        run: npm run build

      - name: 프론트엔드 실행 (백그라운드)
        working-directory: group-buying-frontend
        run: nohup npm run preview -- --port 5173 > frontend.log 2>&1 &

      - name: 프론트 준비 대기
        run: npx wait-on http://localhost:5173

      - name: Playwright 테스트 실행
        working-directory: group-buying-frontend
        run: npx playwright test --reporter=list

      - name: 백엔드 로그 출력 (실패 시 디버깅용)
        if: failure()
        working-directory: group-buying-backend
        run: cat backend.log

      - name: 테스트 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: group-buying-frontend/playwright-report

