name: Backend Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: group-buying-backend

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 권한 부여
        run: chmod +x ./gradlew

      - name: 테스트 실행 + 커버리지 리포트 생성
        run: ./gradlew test jacocoTestReport

      - name: 테스트 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: group-buying-backend/build/reports/tests/test

      - name: 커버리지 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: group-buying-backend/build/reports/jacoco/test/jacocoTestReport.xml